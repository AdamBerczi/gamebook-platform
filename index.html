<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Harcos Képzelet</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Harcos Képzelet">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── MAIN MENU ── -->
  <div id="screen-menu" class="screen active">
    <div class="menu-wrapper">
      <header class="menu-header">
        <p class="menu-series">Harcos Képzelet</p>
        <h1 class="menu-title">Válassz kalandot</h1>
      </header>
      <div class="book-grid" id="book-grid">
        <!-- injected by game.js -->
      </div>
    </div>
  </div>

  <!-- ── CHARACTER CREATION ── -->
  <div id="screen-create" class="screen">
    <div class="create-wrapper">
      <header class="create-header">
        <button class="btn-back" id="btn-back-to-menu">← Vissza</button>
        <p class="create-subtitle" id="create-subtitle">Harcos Képzelet</p>
        <h1 class="create-title" id="create-title">—</h1>
        <p class="create-author" id="create-author">—</p>
      </header>

      <section class="create-section">
        <h2>Válassz fajt</h2>
        <div class="race-grid" id="race-grid"></div>
      </section>

      <section class="create-section">
        <h2>Tulajdonságaid</h2>
        <div class="stats-roll-grid" id="stats-roll-grid"></div>
        <button class="btn-secondary" id="btn-reroll">Újra dob</button>
      </section>

      <button class="btn-primary" id="btn-start">Kaland kezdése</button>
    </div>
  </div>

  <!-- ── GAME SCREEN ── -->
  <div id="screen-game" class="screen">

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-inner">

        <div class="sidebar-book">
          <span class="sidebar-book-title" id="sidebar-book-title">—</span>
        </div>

        <div class="stat-block">
          <div class="stat-row">
            <span class="stat-label">Életerő</span>
            <div class="stat-bar-wrap"><div class="stat-bar" id="bar-eletero"></div></div>
            <span class="stat-value" id="val-eletero">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Varázserő</span>
            <div class="stat-bar-wrap"><div class="stat-bar magic" id="bar-varazserő"></div></div>
            <span class="stat-value" id="val-varazserő">—</span>
          </div>
          <div class="stat-row-simple">
            <span class="stat-label">Támadás</span>
            <span class="stat-value" id="val-tamadasi_kepesseg">—</span>
          </div>
          <div class="stat-row-simple">
            <span class="stat-label">Védettség</span>
            <span class="stat-value" id="val-vedettsegi_szint">—</span>
          </div>
          <div class="stat-row-simple">
            <span class="stat-label">Szerencse</span>
            <span class="stat-value" id="val-szerencse">—</span>
          </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="inventory-block">
          <h3 class="sidebar-section-label">Felszerelés</h3>
          <ul id="inventory-list" class="inventory-list"></ul>
        </div>

        <div class="sidebar-divider"></div>

        <button class="sidebar-action-btn" id="btn-spellbook">
          <span>✦</span> Varázskönyv
        </button>
        <button class="sidebar-action-btn" id="btn-save-load">
          <span>◈</span> Mentés / Betöltés
        </button>

        <div class="sidebar-divider"></div>

        <div class="race-badge-wrap">
          <span class="race-badge" id="race-badge">—</span>
        </div>
        <button class="btn-ghost sidebar-new-game" id="btn-new-game">Új kaland</button>
      </div>
    </aside>

    <main id="main" class="main">
      <div class="mobile-topbar">
        <button class="btn-icon" id="btn-stats-toggle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
        <span class="mobile-title" id="mobile-book-title">—</span>
        <div class="mobile-hp" id="mobile-hp">— ÉL</div>
      </div>

      <div class="section-wrap" id="section-wrap">
        <div class="section-number" id="section-number"></div>
        <div class="section-text" id="section-text"></div>
        <div class="section-illustration hidden" id="section-illustration">
          <img id="section-illustration-img" alt="">
        </div>
        <div class="choices" id="choices"></div>
      </div>

      <div class="loading" id="loading">Betöltés...</div>
    </main>

    <div class="mobile-drawer-overlay" id="drawer-overlay"></div>
    <div class="mobile-drawer" id="mobile-drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-stats" id="drawer-stats"></div>
    </div>

  </div>

  <!-- ── SPELLBOOK MODAL ── -->
  <div class="modal-overlay hidden" id="spellbook-modal">
    <div class="modal-panel">
      <div class="modal-header">
        <h2 class="modal-title">Varázskönyv</h2>
        <button class="modal-close" id="btn-close-spellbook">✕</button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="attack">Támadó</button>
        <button class="modal-tab" data-tab="defense">Védő</button>
      </div>
      <div class="modal-body" id="spellbook-body"></div>
    </div>
  </div>

  <!-- ── SAVE / LOAD MODAL ── -->
  <div class="modal-overlay hidden" id="saveload-modal">
    <div class="modal-panel">
      <div class="modal-header">
        <h2 class="modal-title">Mentés / Betöltés</h2>
        <button class="modal-close" id="btn-close-saveload">✕</button>
      </div>
      <div class="modal-body" id="saveload-body"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
